                                        <div className="h-80 w-full">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <LineChart data={monthlyData} margin={{ top: 10, right: 10, left: 0, bottom: 0 }}>
                                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                                                    <XAxis dataKey="month" tick={{fill: '#64748b', fontSize: 12}} tickLine={false} axisLine={false} />
                                                    <YAxis tick={{fill: '#64748b', fontSize: 12}} tickLine={false} axisLine={false} width={40} />
                                                    <Tooltip contentStyle={{ borderRadius: '8px', border: '1px solid #e2e8f0', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)' }} />
                                                    <Line type="monotone" dataKey="users" name="Active Users" stroke="#10b981" strokeWidth={3} dot={{ r: 4, strokeWidth: 2 }} activeDot={{ r: 6 }} />
                                                    <Line type="monotone" dataKey="subs" name="Active Subs" stroke="#8b5cf6" strokeWidth={3} strokeDasharray="5 5" dot={false} />
                                                    <Legend verticalAlign="top" height={36} iconType="circle"/>
                                                </LineChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB 2: COHORT ANALYSIS */}
                        {activeTab === 'cohort' && (
                            <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm animate-in fade-in duration-300 relative overflow-hidden">
                                <div className="absolute top-0 right-0 bg-orange-100 text-orange-700 text-[10px] font-bold px-2 py-1 rounded-bl-lg"> </div>
                                <div className="flex items-start justify-between mb-6">
                                    <div className="flex items-center">
                                        <div className="text-slate-800 p-2 bg-slate-100 rounded-lg mr-3"><Icons.Grid /></div>
                                        <div>
                                            <h3 className="text-xl font-bold text-slate-900">Retention by Cohort (Weekly)</h3>
                                            <p className="text-sm text-slate-500 mt-1">
                                                Cohort xác định theo <strong className="text-slate-700">thời điểm user bắt đầu subscription ĐẦU TIÊN</strong>.
                                            </p>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="overflow-x-auto custom-scrollbar pb-2">
                                    <table className="w-full text-sm text-left border-collapse min-w-max">
                                        <thead>
                                            <tr>
                                                <th className="px-4 py-3 font-semibold text-slate-700 bg-slate-50 border-b border-slate-200 sticky left-0 z-10">Cohort (Tuần)</th>
                                                <th className="px-4 py-3 font-semibold text-slate-700 bg-slate-50 text-center border-b border-slate-200 border-r border-white">Size</th>
                                                {[...Array(13)].map((_, i) => (
                                                    <th key={i} className="px-4 py-3 font-semibold text-slate-700 bg-slate-50 text-center border-b border-white w-20">W{i}</th>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {cohortData.map((row, i) => (
                                                <tr key={i} className="hover:bg-slate-50 transition-colors">
                                                    <td className="px-4 py-2 font-medium text-slate-900 border-b border-slate-100 sticky left-0 bg-white z-10 shadow-[1px_0_0_0_#f1f5f9]">{row.cohort}</td>
                                                    <td className="px-4 py-2 text-center font-semibold text-slate-600 border-b border-slate-100 border-r border-slate-100">{row.size}</td>
                                                    {row.retention.map((val, wIndex) => {
                                                        if (val === null) return <td key={wIndex} className="bg-slate-50/50 border-b border-white"></td>;
                                                        
                                                        const opacity = val === 1 ? 0.9 : Math.max(0.1, (val - 0.5) * 2); 
                                                        const bgColor = `rgba(37, 99, 235, ${opacity})`;
                                                        const textColor = val > 0.75 ? 'text-white' : 'text-slate-800';
                                                        
                                                        return (
                                                            <td key={wIndex} className={`px-4 py-3 text-center font-medium ${textColor} border-b border-white border-r border-slate-50`} style={{ backgroundColor: bgColor }}>
                                                                {formatPercent(val)}
                                                            </td>
                                                        );
                                                    })}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* TAB 3: METHODOLOGY & VERIFIABILITY */}
                        {activeTab === 'methodology' && (
                            <div className="space-y-6 animate-in fade-in duration-300">
                                <div className="bg-slate-800 p-8 rounded-xl shadow-lg text-white">
                                    <h2 className="text-2xl font-bold mb-2 flex items-center">
                                        Documentation: Data Methodology & Edge Cases
                                    </h2>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    {/* CỘT 1: CÁC METRICS CƠ BẢN */}
                                    <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm space-y-6">
                                        <h3 className="text-xl font-bold text-slate-900 border-b pb-3 flex items-center">
                                            <Icons.CheckCircle /> <span className="ml-2">1. Định nghĩa & Phân tích</span>
                                        </h3>
                                        
                                        <div className="space-y-4 text-slate-700 text-sm">
                                            <div className="bg-slate-50 p-4 rounded-lg border border-slate-100">
                                                <h4 className="font-bold text-slate-900 mb-2">1.1. Accrual MRR (Doanh thu Dồn tích)</h4>
                                                <p className="mb-2"><strong>Bản chất:</strong> Thay vì ghi nhận toàn bộ dòng tiền vào tháng khách hàng thanh toán (Cash-flow), kế toán dồn tích (Accrual) chia đều doanh thu ra suốt thời gian cung cấp dịch vụ thực tế.</p>
                                                <p className="mb-2"><strong>Cách tính:</strong> <code>Daily Revenue = Tổng tiền / Tổng số ngày của gói</code>.</p>
                                                <div className="bg-blue-50 text-blue-800 p-3 rounded text-xs border border-blue-100 mt-2">
                                                    <strong>Ý nghĩa cho VC:</strong> MRR dồn tích cho thấy quy mô hoạt động thực sự của mô hình SaaS. Nó trả lời câu hỏi: "Nền tảng đang phục vụ lượng dịch vụ trị giá bao nhiêu tiền mỗi tháng?" để đánh giá định giá công ty.
                                                </div>
                                            </div>

                                            <div className="bg-slate-50 p-4 rounded-lg border border-slate-100">
                                                <h4 className="font-bold text-slate-900 mb-2">1.2. Accrual Active Users</h4>
                                                <p className="mb-2"><strong>Định nghĩa:</strong> Khác với DAU (mở app mỗi ngày), user được coi là "Active" về mặt tài chính trong tháng nếu họ <strong>đang sở hữu một gói dịch vụ còn hiệu lực ít nhất 1 ngày</strong> trong tháng đó.</p>
                                                <div className="bg-emerald-50 text-emerald-800 p-3 rounded text-xs border border-emerald-100 mt-2">
                                                    <strong>Ý nghĩa cho VC:</strong> Dùng để đối chiếu với MRR, xem tốc độ mở rộng tập khách hàng (Scale) có đang diễn ra tương xứng với sự tăng trưởng doanh thu hay không (tính toán ARPU).
                                                </div>
                                            </div>

                                            <div className="bg-slate-50 p-4 rounded-lg border border-slate-100">
                                                <h4 className="font-bold text-slate-900 mb-2">1.3. Cohort Retention (Theo Nhóm)</h4>
                                                <p className="mb-2"><strong>Định nghĩa:</strong> Gom nhóm theo <strong>tuần mua hàng ĐẦU TIÊN</strong>. Đo lường tỷ lệ % khách tiếp tục gia hạn ở các tuần W1 đến W12.</p>
                                                <ul className="list-disc pl-5 text-sm space-y-1 mt-2">
                                                    <li><strong>Giai đoạn W0 - W4:</strong> Tỷ lệ thường là 100% do người dùng phần lớn đang sử dụng gói 1 tháng.</li>
                                                    <li><strong>Tỷ lệ Rời bỏ (Churn Rate -  từ W5):</strong> Điểm rơi quan trọng nhất khi gói 1 tháng hết hạn. Tỷ lệ % còn lại chính là lượng khách hàng quyết định <strong>Gia hạn (Renew)</strong>.</li>
                                                </ul>
                                            </div>
                                        </div>
                                    </div>

                                    {/* CỘT 2: XỬ LÝ NGOẠI LAI (OUTLIERS) */}
                                    <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm space-y-6">
                                        <h3 className="text-xl font-bold text-slate-900 border-b pb-3 flex items-center">
                                            <Icons.Settings /> <span className="ml-2">2. Xử lý Dữ liệu Ngoại lai (Outliers)</span>
                                        </h3>
                                        
                                        <div className="space-y-4 text-slate-700 text-sm">
                                            <div className="bg-orange-50 p-4 rounded-lg border border-orange-100">
                                                <h4 className="font-bold text-slate-900 mb-2">2.1.Upgrades & Overlaps</h4>
                                                <p className="mb-2"><strong>Tình huống:</strong> Khách đang dùng gói 1 tháng (còn hạn 15 ngày) nhưng quyết định mua thêm/nâng cấp lên gói 1 năm ngay lập tức.</p>
                                                <ul className="list-disc pl-5 space-y-1">
                                                    <li><strong>Về MRR:</strong> Kế toán dồn tích sẽ tự động cộng dồn (Stack) doanh thu của cả 2 gói trong 15 ngày trùng lặp đó, phản ánh chính xác Expansion MRR (Doanh thu mở rộng).</li>
                                                    <li><strong>Về User:</strong> Hàm <code>nunique()</code> đảm bảo User này vẫn chỉ được đếm là 1 Active User, không làm lạm phát cơ sở người dùng.</li>
                                                </ul>
                                            </div>

                                            <div className="bg-blue-50 p-4 rounded-lg border border-blue-100">
                                                <h4 className="font-bold text-slate-900 mb-2">2.2. Free Trials</h4>
                                                <p className="mb-2"><strong>Tình huống:</strong> Khách dùng mã giảm giá 100% hoặc đăng ký tài khoản trải nghiệm 0đ.</p>
                                                <p><strong>Xử lý:</strong> Pipeline dữ liệu tự động lọc bỏ các bản ghi không mang lại giá trị tài chính. Việc tách bạch giữa "Người dùng miễn phí" và "Người dùng trả phí" giúp tránh làm méo mó chỉ số ARPU (Average Revenue Per User) báo cáo cho nhà đầu tư.</p>
                                            </div>

                                            <div className="bg-purple-50 p-4 rounded-lg border border-purple-100">
                                                <h4 className="font-bold text-slate-900 mb-2">2.3. Reactivation & The Smiling Curve</h4>
                                                <p className="mb-2"><strong>Tình huống:</strong> Khách hết hạn gói vào Tuần 4 (Rời bỏ - Churn), nhưng đến Tuần 8 bỗng nhiên quay lại mua gói mới.</p>
                                                <p><strong>Xử lý:</strong> Cơ chế quét thời gian động trong biểu đồ Cohort cho phép tỷ lệ Retention có thể <strong>tăng trở lại</strong> ở các tuần sau. Điều này tạo ra tín hiệu "Smile Curve" (Đường cong nụ cười) - chứng minh sản phẩm có lực hút mạnh mẽ khiến khách hàng cũ quay lại.</p>
                                            </div>

                                            <div className="bg-slate-50 p-4 rounded-lg border border-slate-100">
                                                <h4 className="font-bold text-slate-900 mb-2">2.4.Installments</h4>
                                                <p className="mb-2"><strong>Tình huống:</strong> Khách mua gói 12 triệu nhưng trả góp mỗi tháng 1 triệu.</p>
                                                <p><strong>Xử lý:</strong> Báo cáo ghi nhận <code>Tổng giá trị đơn hàng</code> (12 triệu) chia đều cho số ngày sử dụng, thay vì ghi nhận theo từng cục tiền 1 triệu lẻ tẻ. Điều này loại bỏ độ trễ của dòng tiền (Cash-flow lag) và phản ánh đúng quy mô bán hàng của tháng đó.</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
